apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fastgateway.fullname" . }}-backend
  labels:
    {{- include "fastgateway.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "fastgateway.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fastgateway.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "fastgateway.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "fastgateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.securityContext | nindent 8 }}
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.backend.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: SERVER_ADDRESS
              value: ":8081"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fastgateway.fullname" . }}
                  key: LOG_LEVEL
            - name: ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fastgateway.fullname" . }}
                  key: ADMIN_USERNAME
            - name: ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fastgateway.fullname" . }}
                  key: ADMIN_EMAIL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.secretName" . }}
                  key: jwt-secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.secretName" . }}
                  key: encryption-key
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.secretName" . }}
                  key: admin-password
            - name: DATABASE_HOST
              value: {{ include "fastgateway.databaseHost" . | quote }}
            - name: DATABASE_PORT
              value: {{ include "fastgateway.databasePort" . | quote }}
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.databaseSecretName" . }}
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.databaseSecretName" . }}
                  key: password
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.databaseSecretName" . }}
                  key: database
            {{- if eq .Values.database.type "external" }}
            {{- if and .Values.database.external.sslmode (ne .Values.database.external.sslmode "disable") }}
            - name: DATABASE_SSLMODE
              value: {{ .Values.database.external.sslmode | quote }}
            {{- end }}
            {{- if .Values.database.external.sslrootcert }}
            - name: DATABASE_SSLROOTCERT
              value: {{ .Values.database.external.sslrootcert | quote }}
            {{- end }}
            {{- if .Values.database.external.sslcert }}
            - name: DATABASE_SSLCERT
              value: {{ .Values.database.external.sslcert | quote }}
            {{- end }}
            {{- if .Values.database.external.sslkey }}
            - name: DATABASE_SSLKEY
              value: {{ .Values.database.external.sslkey | quote }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
