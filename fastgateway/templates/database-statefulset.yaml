{{- if eq .Values.database.type "internal" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fastgateway.fullname" . }}-database
  labels:
    {{- include "fastgateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "fastgateway.fullname" . }}-database
  replicas: 1
  selector:
    matchLabels:
      {{- include "fastgateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "fastgateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      {{- include "fastgateway.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: postgres
          image: "{{ .Values.database.internal.image.repository }}:{{ .Values.database.internal.image.tag }}"
          imagePullPolicy: {{ .Values.database.internal.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.fullname" . }}-database
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.fullname" . }}-database
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastgateway.fullname" . }}-database
                  key: database
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.database.internal.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.database.internal.storage.storageClassName }}
        storageClassName: {{ .Values.database.internal.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.internal.storage.size }}
{{- end }}
