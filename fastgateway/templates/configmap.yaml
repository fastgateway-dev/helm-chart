apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fastgateway.fullname" . }}
  labels:
    {{- include "fastgateway.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  JWT_EXPIRY: {{ .Values.config.jwtExpiry | quote }}
  REFRESH_TOKEN_EXPIRY: {{ .Values.config.refreshTokenExpiry | quote }}
  {{- if .Values.config.corsAllowedOrigins }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  {{- else if .Values.ingress.enabled }}
  CORS_ALLOWED_ORIGINS: {{ printf "https://%s" .Values.ingress.frontend.host | quote }}
  {{- else }}
  CORS_ALLOWED_ORIGINS: "*"
  {{- end }}
  ADMIN_USERNAME: {{ .Values.config.adminUsername | quote }}
  ADMIN_EMAIL: {{ .Values.config.adminEmail | quote }}
