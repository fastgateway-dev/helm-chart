{{- if not .Values.secrets.existingSecret }}
{{- $secretName := printf "%s-secrets" (include "fastgateway.fullname" .) }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "fastgateway.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $existingSecret }}
  jwt-secret: {{ index $existingSecret.data "jwt-secret" }}
  encryption-key: {{ index $existingSecret.data "encryption-key" }}
  admin-password: {{ index $existingSecret.data "admin-password" }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  encryption-key: {{ randAlphaNum 32 | b64enc | quote }}
  admin-password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
{{- end }}
