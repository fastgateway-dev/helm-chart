# FastGateway Helm Chart Values

# Global settings
global:
  # Image pull secrets for private registries
  imagePullSecrets: []

# Backend configuration
backend:
  image:
    repository: fastgatewaydev/backend
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 8081

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

# Frontend configuration
frontend:
  image:
    repository: fastgatewaydev/frontend
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  service:
    type: ClusterIP
    port: 3001

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

# Database configuration (PostgreSQL)
database:
  # Type of database: "internal" (deploys PostgreSQL StatefulSet) or "external" (user-provided)
  type: "internal"

  # Internal PostgreSQL (used when type: internal)
  # Deploys a single-replica PostgreSQL StatefulSet for testing/development
  internal:
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    username: "fastgateway"
    password: "fastgateway"
    database: "fastgateway"
    storage:
      size: "1Gi"
      storageClassName: ""
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # External PostgreSQL (used when type: external)
  # Create a secret with keys: username, password, database
  external:
    host: ""
    port: 5432
    existingSecret: ""
    # SSL/TLS configuration
    sslmode: ""        # disable, require, verify-ca, verify-full (default: disable)
    sslrootcert: ""    # Path to CA certificate file
    sslcert: ""        # Path to client certificate file (mTLS)
    sslkey: ""         # Path to client key file (mTLS)

# Application configuration
config:
  logLevel: "info"
  adminUsername: "admin"
  adminEmail: "admin@fastgateway.local"

# Secrets configuration
# If empty, secrets will be auto-generated on first install
# Create a secret with keys: jwt-secret, encryption-key, admin-password
secrets:
  existingSecret: ""

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# WAF (coraza-proxy-wasm) configuration
waf:
  # OCI image for coraza-proxy-wasm
  image: ghcr.io/corazawaf/coraza-proxy-wasm
  tag: "0.6.0"
  # Optional SHA256 for image pinning (leave empty to skip verification)
  sha256: ""
